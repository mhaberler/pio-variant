; Shared platform / framework for all envs.
; pioarduino-build.py picks up board_build.variants_dir per env:
;   https://github.com/espressif/arduino-esp32/blob/master/tools/pioarduino-build.py
[platformio]
default_envs = my_board

[common]
platform      = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework     = arduino
board_dir     = ${PROJECT_DIR}/boards
monitor_speed = 115200
upload_speed  = 921600

[env:my_board]
extends = common
board                    = my_board
board_build.variants_dir = variants
board_build.variant      = my_board

[env:esp32_p4_wifi6]
extends = common
board                    = esp32_p4_wifi6
board_build.variants_dir = variants
board_build.variant      = esp32_p4_wifi6

